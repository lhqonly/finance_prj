<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频字幕 / 转写提取器</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <h1>视频字幕 / 转写提取器</h1>
    <p class="sub">粘贴 B站 / 抖音 视频链接，每行一个。优先抓字幕，没字幕自动 Whisper 转写。</p>

    <div id="env" class="env"></div>

    <textarea id="urls" rows="5"
      placeholder="https://www.bilibili.com/video/xxxx&#10;https://www.douyin.com/video/yyyy"></textarea>

    <div class="row">
      <label>Whisper 模型
        <select id="model">
          <option value="small" selected>small（macOS 推荐，口播够用）</option>
          <option value="medium">medium（更准，比 small 慢些）</option>
          <option value="large">large（最准，最慢，CPU）</option>
        </select>
      </label>
      <button id="go">开始提取</button>
    </div>

    <div class="row">
      <label>抖音主页日期区间
        <input type="date" id="from" /> 至 <input type="date" id="to" />
      </label>
      <span class="hint">仅对「douyin.com/user/…」主页链接生效，按区间批量抓该号作品；留空=全部</span>
    </div>

    <div class="row">
      <label><input type="checkbox" id="resume" checked /> 断点续传</label>
      <span class="hint">勾选后跳过 transcripts/ 里<b>已转写过</b>的作品（按标题判断），只补转新增/漏掉的——
        换更快的模型重新提交同一主页时，已转好的不会重复跑。取消勾选则全部重新转。</span>
    </div>

    <div id="overall" class="overall hidden">
      <div class="bar"><div id="overallFill" class="fill"></div></div>
      <div class="overall-meta"><span id="overallText">0%</span>
        <button id="zip" class="link hidden">⬇ 打包下载全部</button></div>
    </div>

    <ul id="list" class="list"></ul>
  </main>
  <aside id="debug" class="hidden">
    <h3>运行日志</h3>
    <div id="debugBody"></div>
  </aside>
  <script src="/app.js"></script>
</body>
</html>
